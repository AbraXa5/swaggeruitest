openapi: 3.0.1

info:
  title: SSRF Probe
  version: "v1"
  description: >
    Connectivity test spec for local services from Swagger UI.
    Swagger UI can only test HTTP/HTTPS endpoints.
    Native TCP services like PostgreSQL, MySQL, and Redis will not respond
    properly unless they are exposed through an HTTP gateway or admin API.

servers:
  - url: "{scheme}://{host}:{port}"
    description: Local service endpoint
    variables:
      scheme:
        default: http
        enum: [http, https]
      host:
        default: 127.0.0.1
        enum: [127.0.0.1, localhost, 127.1]
      port:
        default: "8000"
        enum:
          - "80"
          - "81"
          - "443"
          - "3000"
          - "5000"
          - "8000"
          - "8080"
          - "8081"
          - "8443"
          - "8888"
          - "9000"
          - "9090"
          - "9091"
          - "9200"
          - "9443"
          - "10000"
          - "15672"
          - "2375"
          - "2376"
          - "5432"
          - "6379"
          - "3306"

tags:
  - name: Generic
    description: Generic probes for common HTTP services
  - name: Web
    description: Common web server and reverse proxy probes
  - name: Docker
    description: Docker Engine API probes
  - name: Monitoring
    description: Monitoring and metrics probes
  - name: Admin
    description: Common admin and diagnostic probes
  - name: Docs
    description: OpenAPI, Swagger, and docs-related probes

paths:
  /:
    get:
      tags: [Generic, Web]
      summary: Root probe
      operationId: rootProbe
      responses:
        "200":
          description: OK
        default:
          description: Any response from target service

  /health:
    get:
      tags: [Generic]
      summary: Health probe
      operationId: healthProbe
      responses:
        "200":
          description: Health endpoint responded
        default:
          description: Any response from target service

  /status:
