swagger: '2.0'
info:
  version: 1.0.0
  title: SuperSecure Login Page
  description: Login to SuperSecure services below or go to https://thissiteisevil.com

paths:
  /SuperSecure_Login:
    post:
      summary: Login to SuperSecure services to continue
      description: Please provide your credentials to log in to SuperSecure services.
      parameters:
        - name: username
          in: formData
          description: The username for login
          required: true
          type: string
        - name: password
          in: formData
          description: The password for login
          required: true
          type: string
      tags:
        - Click here to login
      responses:
        '200':
          description: Successfully logged in and authenticated.
        '400':
          description: Invalid credentials or missing parameters.
        '500':
          description: Internal server error.
